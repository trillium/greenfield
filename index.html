<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abyssal — Deep Sea Bioluminescence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; cursor: none; }
  #ui {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(120, 200, 255, 0.5); font-family: 'Courier New', monospace;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    pointer-events: none; text-align: center; user-select: none;
    transition: opacity 2s;
  }
  #ui.hidden { opacity: 0; }
  #depth {
    position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
    color: rgba(120, 200, 255, 0.3); font-family: 'Courier New', monospace;
    font-size: 11px; writing-mode: vertical-rl; letter-spacing: 3px;
    pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">move to illuminate · click to pulse</div>
<div id="depth">depth: 3800m</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
resize();
addEventListener('resize', resize);

// Hide hint after 5s
setTimeout(() => document.getElementById('ui').classList.add('hidden'), 5000);

// Mouse
let mx = W / 2, my = H / 2, pmx = mx, pmy = my;
let mouseDown = false;
let mouseSpeed = 0;
let pulseWaves = [];

addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
addEventListener('mousedown', e => {
  mouseDown = true;
  pulseWaves.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 1, hue: 180 + Math.random() * 60 });
});
addEventListener('mouseup', () => mouseDown = false);
addEventListener('touchmove', e => { e.preventDefault(); mx = e.touches[0].clientX; my = e.touches[0].clientY; }, { passive: false });
addEventListener('touchstart', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
  pulseWaves.push({ x: mx, y: my, r: 0, alpha: 1, hue: 180 + Math.random() * 60 });
});

// Particles — ambient plankton
class Plankton {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -10;
    this.size = 0.5 + Math.random() * 2;
    this.baseAlpha = 0.1 + Math.random() * 0.3;
    this.alpha = this.baseAlpha;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = 0.2 + Math.random() * 0.5;
    this.wobbleAmp = 0.5 + Math.random() * 1.5;
    this.wobbleFreq = 0.005 + Math.random() * 0.01;
    this.wobbleOff = Math.random() * 1000;
    this.hue = 170 + Math.random() * 50;
    this.glowRadius = this.size * (3 + Math.random() * 4);
  }
  update(t) {
    this.x += this.vx + Math.sin(t * this.wobbleFreq + this.wobbleOff) * this.wobbleAmp * 0.3;
    this.y += this.vy;
    // React to mouse proximity
    const dx = this.x - mx, dy = this.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      const influence = 1 - dist / 200;
      this.alpha = this.baseAlpha + influence * 0.7;
      this.x += dx * influence * 0.02;
      this.y += dy * influence * 0.02;
    } else {
      this.alpha += (this.baseAlpha - this.alpha) * 0.05;
    }
    if (this.y > H + 10 || this.x < -20 || this.x > W + 20) this.reset(false);
  }
  draw() {
    ctx.save();
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glowRadius);
    grd.addColorStop(0, `hsla(${this.hue}, 100%, 80%, ${this.alpha})`);
    grd.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.glowRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, ${this.alpha * 1.5})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Jellyfish
class Jellyfish {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 20 + Math.random() * 40;
    this.hue = 200 + Math.random() * 80;
    this.alpha = 0.15 + Math.random() * 0.25;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.015 + Math.random() * 0.01;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -0.3 - Math.random() * 0.5;
    this.tentacles = 5 + Math.floor(Math.random() * 4);
    this.tentacleLen = this.size * (1.5 + Math.random());
    this.wobble = Math.random() * 1000;
    this.glowIntensity = 0;
  }
  update(t) {
    this.pulsePhase += this.pulseSpeed;
    const pulse = Math.sin(this.pulsePhase);
    this.vy += pulse * 0.005 - 0.002;
    this.x += this.vx + Math.sin(t * 0.002 + this.wobble) * 0.5;
    this.y += this.vy;

    // React to mouse
    const dx = this.x - mx, dy = this.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 250) {
      const influence = 1 - dist / 250;
      this.glowIntensity += (influence - this.glowIntensity) * 0.1;
      this.x += dx * influence * 0.008;
      this.y += dy * influence * 0.008;
    } else {
      this.glowIntensity *= 0.95;
    }

    // Wrap
    if (this.y < -this.size * 3) { this.y = H + this.size * 2; this.x = Math.random() * W; }
    if (this.y > H + this.size * 3) { this.y = -this.size * 2; this.x = Math.random() * W; }
    if (this.x < -this.size * 2) this.x = W + this.size;
    if (this.x > W + this.size * 2) this.x = -this.size;
  }
  draw(t) {
    ctx.save();
    const pulse = Math.sin(this.pulsePhase);
    const currentSize = this.size * (0.85 + pulse * 0.15);
    const bellH = currentSize * 0.7;
    const totalAlpha = this.alpha + this.glowIntensity * 0.4;

    // Outer glow
    const outerGlow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, currentSize * 2.5);
    outerGlow.addColorStop(0, `hsla(${this.hue}, 80%, 60%, ${totalAlpha * 0.15})`);
    outerGlow.addColorStop(1, `hsla(${this.hue}, 80%, 40%, 0)`);
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(this.x, this.y, currentSize * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Bell body
    ctx.beginPath();
    ctx.moveTo(this.x - currentSize, this.y);
    ctx.quadraticCurveTo(this.x - currentSize, this.y - bellH, this.x, this.y - bellH * 1.1);
    ctx.quadraticCurveTo(this.x + currentSize, this.y - bellH, this.x + currentSize, this.y);
    ctx.quadraticCurveTo(this.x + currentSize * 0.5, this.y + bellH * 0.2, this.x, this.y + bellH * 0.1);
    ctx.quadraticCurveTo(this.x - currentSize * 0.5, this.y + bellH * 0.2, this.x - currentSize, this.y);
    const bellGrad = ctx.createRadialGradient(this.x, this.y - bellH * 0.5, 0, this.x, this.y - bellH * 0.3, currentSize * 1.2);
    bellGrad.addColorStop(0, `hsla(${this.hue}, 90%, 75%, ${totalAlpha * 0.6})`);
    bellGrad.addColorStop(0.5, `hsla(${this.hue}, 80%, 55%, ${totalAlpha * 0.3})`);
    bellGrad.addColorStop(1, `hsla(${this.hue}, 70%, 40%, ${totalAlpha * 0.1})`);
    ctx.fillStyle = bellGrad;
    ctx.fill();

    // Inner bell highlight
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - bellH * 0.4, currentSize * 0.4, bellH * 0.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue + 20}, 100%, 85%, ${totalAlpha * 0.3})`;
    ctx.fill();

    // Tentacles
    ctx.lineWidth = 1.5;
    for (let i = 0; i < this.tentacles; i++) {
      const tx = this.x + (i / (this.tentacles - 1) - 0.5) * currentSize * 1.4;
      ctx.beginPath();
      ctx.moveTo(tx, this.y + bellH * 0.05);
      const segments = 6;
      let cx = tx, cy = this.y + bellH * 0.05;
      for (let s = 0; s < segments; s++) {
        const progress = s / segments;
        const sway = Math.sin(t * 0.003 + this.wobble + i + s * 0.8) * (10 + progress * 15);
        cx += sway * 0.3;
        cy += this.tentacleLen / segments;
        ctx.lineTo(cx + sway, cy);
      }
      const tentAlpha = totalAlpha * (0.4 - 0.2 * (Math.abs(i - this.tentacles / 2) / this.tentacles));
      ctx.strokeStyle = `hsla(${this.hue + 30}, 90%, 70%, ${tentAlpha})`;
      ctx.stroke();
    }

    // Bioluminescent dots along bell edge
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI + Math.PI;
      const bx = this.x + Math.cos(angle) * currentSize * 0.9;
      const by = this.y - bellH * 0.3 + Math.sin(angle) * bellH * 0.5;
      const dotAlpha = totalAlpha * (0.5 + Math.sin(t * 0.01 + i) * 0.3);
      ctx.beginPath();
      ctx.arc(bx, by, 2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue + 40}, 100%, 90%, ${dotAlpha})`;
      ctx.fill();
    }

    ctx.restore();
  }
}

// Mouse trail / light trail
class TrailPoint {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.alpha = 1;
    this.size = 3 + mouseSpeed * 0.5;
  }
}

// Deep sea light beams from above
class LightBeam {
  constructor() {
    this.x = Math.random() * W;
    this.width = 30 + Math.random() * 80;
    this.alpha = 0.02 + Math.random() * 0.03;
    this.speed = 0.1 + Math.random() * 0.2;
    this.wobble = Math.random() * 1000;
  }
  update(t) {
    this.x += Math.sin(t * 0.001 + this.wobble) * this.speed;
  }
  draw() {
    const grad = ctx.createLinearGradient(this.x, 0, this.x, H);
    grad.addColorStop(0, `rgba(80, 160, 220, ${this.alpha})`);
    grad.addColorStop(0.3, `rgba(40, 100, 180, ${this.alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(0, 20, 60, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(this.x - this.width / 2, 0);
    ctx.lineTo(this.x + this.width / 2, 0);
    ctx.lineTo(this.x + this.width * 1.5, H);
    ctx.lineTo(this.x - this.width * 1.5, H);
    ctx.fill();
  }
}

// Initialize entities
const planktonCount = Math.min(300, Math.floor(W * H / 5000));
const plankton = Array.from({ length: planktonCount }, () => new Plankton());
const jellyfishCount = 5 + Math.floor(Math.random() * 4);
const jellyfish = Array.from({ length: jellyfishCount }, () => new Jellyfish());
const beams = Array.from({ length: 4 }, () => new LightBeam());
let trail = [];

// Cursor glow
function drawCursor(t) {
  const breathe = Math.sin(t * 0.003) * 0.15 + 0.85;
  const radius = (15 + mouseSpeed * 2) * breathe;

  // Outer glow
  const glow = ctx.createRadialGradient(mx, my, 0, mx, my, radius * 4);
  glow.addColorStop(0, `hsla(195, 100%, 75%, ${0.15 * breathe})`);
  glow.addColorStop(0.5, `hsla(210, 90%, 60%, ${0.05 * breathe})`);
  glow.addColorStop(1, 'hsla(220, 80%, 40%, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(mx, my, radius * 4, 0, Math.PI * 2);
  ctx.fill();

  // Core
  const core = ctx.createRadialGradient(mx, my, 0, mx, my, radius);
  core.addColorStop(0, `hsla(190, 100%, 90%, ${0.6 * breathe})`);
  core.addColorStop(0.5, `hsla(200, 100%, 70%, ${0.2 * breathe})`);
  core.addColorStop(1, 'hsla(210, 100%, 50%, 0)');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(mx, my, radius, 0, Math.PI * 2);
  ctx.fill();
}

// Draw trail
function drawTrail() {
  for (let i = trail.length - 1; i >= 0; i--) {
    const p = trail[i];
    p.alpha *= 0.96;
    if (p.alpha < 0.01) { trail.splice(i, 1); continue; }
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
    glow.addColorStop(0, `hsla(195, 100%, 80%, ${p.alpha * 0.4})`);
    glow.addColorStop(1, 'hsla(200, 100%, 50%, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Pulse waves
function drawPulses() {
  for (let i = pulseWaves.length - 1; i >= 0; i--) {
    const pw = pulseWaves[i];
    pw.r += 4;
    pw.alpha *= 0.97;
    if (pw.alpha < 0.01) { pulseWaves.splice(i, 1); continue; }
    ctx.strokeStyle = `hsla(${pw.hue}, 90%, 70%, ${pw.alpha * 0.5})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pw.x, pw.y, pw.r, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.strokeStyle = `hsla(${pw.hue + 20}, 100%, 85%, ${pw.alpha * 0.3})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(pw.x, pw.y, pw.r * 0.6, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// Background gradient — deep ocean
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#020b1a');
  grad.addColorStop(0.3, '#010814');
  grad.addColorStop(0.7, '#000610');
  grad.addColorStop(1, '#00040a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// Floating marine snow
class MarineSnow {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.5 + Math.random() * 1;
    this.vy = 0.1 + Math.random() * 0.3;
    this.vx = (Math.random() - 0.5) * 0.1;
    this.alpha = 0.05 + Math.random() * 0.1;
    this.wobble = Math.random() * 1000;
  }
  update(t) {
    this.y += this.vy;
    this.x += this.vx + Math.sin(t * 0.002 + this.wobble) * 0.1;
    if (this.y > H + 5) { this.y = -5; this.x = Math.random() * W; }
  }
  draw() {
    ctx.fillStyle = `rgba(180, 200, 220, ${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

const snowCount = Math.min(150, Math.floor(W * H / 10000));
const snow = Array.from({ length: snowCount }, () => new MarineSnow());

// Depth indicator
let depthOffset = 0;
function updateDepth(t) {
  depthOffset = Math.sin(t * 0.0005) * 200;
  document.getElementById('depth').textContent = `depth: ${(3800 + Math.floor(depthOffset))}m`;
}

// Main loop
let lastTime = 0;
function animate(time) {
  const dt = time - lastTime;
  lastTime = time;

  mouseSpeed = Math.sqrt((mx - pmx) ** 2 + (my - pmy) ** 2);

  // Add trail points
  if (mouseSpeed > 1) {
    trail.push(new TrailPoint(mx, my));
    if (trail.length > 60) trail.shift();
  }

  drawBackground();

  // Light beams
  ctx.globalCompositeOperation = 'screen';
  beams.forEach(b => { b.update(time); b.draw(); });

  // Marine snow
  ctx.globalCompositeOperation = 'source-over';
  snow.forEach(s => { s.update(time); s.draw(); });

  // Plankton
  ctx.globalCompositeOperation = 'screen';
  plankton.forEach(p => { p.update(time); p.draw(); });

  // Jellyfish
  jellyfish.forEach(j => { j.update(time); j.draw(time); });

  // Trail & cursor
  drawTrail();
  drawCursor(time);
  drawPulses();

  // Reset composite
  ctx.globalCompositeOperation = 'source-over';

  // Update depth
  updateDepth(time);

  pmx = mx;
  pmy = my;

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
